<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scott Labrum</title>
    <link rel="stylesheet" href="./style.css">
    <script src="https://kit.fontawesome.com/9d30e524a6.js" crossorigin="anonymous"></script>
</head>
<body>
    <section id="about-me">
        <nav>
          <div class="personal__logo">Scott Labrum</div>
          <ul class="nav__link--list">
            <li>
                <a href="" class="
                nav__link--anchor
                link__hover-effect
                link__hover-effect--black
                ">Languages</a>
                <a href="" class="
                nav__link--anchor
                link__hover-effect
                link__hover-effect--black
                ">Projects</a>
                <a href="" class="
                nav__link--anchor
                nav__link--anchor-primary
                ">Contact</a>
            </li>
          </ul>  
        </nav>
        <div class="flex flex-1">
            <div class="about-me__info row">
                <div class="about-me__info--container">
                <figure class="about-me__picture--mask">
                    <img src="./assets/me.jpg" class="about-me__picture" alt="Picture of Me!">
                </figure>
                <h1 class="about-me__info--title">
                    Hey! I'm <span class="text--blue">Scott Labrum</span>
                </h1>
                <p class="about-me__info--para">
                    I am a <strong>Frontend Developer</strong> that is passionate about about building responsive and clean performing websites that are user friendly.
                </p>
                <div class="about-me__links">
                    <a href="" class="about-me__link">
                        <i class="fa-brands fa-linkedin-in"></i>
                    </a>
                    <a href="" class="about-me__link">
                        <i class="fa-brands fa-github"></i>
                    </a>
                    <a href="" class="about-me__link">
                        <i class="fa-solid fa-envelope"></i>
                    </a>
                    <a href="" class="about-me__link">
                        <i class="fa-solid fa-file"></i>
                    </a>
                </div>
                </div>
                <figure class="about-me__img--container">
                    <img src="./assets/Under construction-amico.svg" class="about-me__img" alt="">
                </figure>
            </div> 
        </div>
    </section>
    <section id="languages">
        <div class="container">
            <div class="row">
                <h1 class="section__title"><span class="text--blue">My Technology Stack</span></h1>
            <div class="language__list">
                <div class="language">
                  <figure class="language__img--wrapper">
                    <img src="./assets/htmllogo.png" class="language__img" alt="Html logo">
                  </figure>
                  <span class="language__name">HTML</span>
                </div>
                <div class="language">
                  <figure class="language__img--wrapper">
                    <img src="./assets/Css.png" class="language__img" alt="Html logo">
                  </figure>
                  <span class="language__name">CSS</span>
                </div>
                <div class="language">
                  <figure class="language__img--wrapper">
                    <img src="./assets/Javascript.png" class="language__img" alt="Html logo">
                  </figure>
                  <span class="language__name">Javascript</span>
                </div>
                <div class="language">
                  <figure class="language__img--wrapper">
                    <img src="./assets/React.png" class="language__img" alt="Html logo">
                  </figure>
                  <span class="language__name">React</span>
                </div>
                </div>
            </div>
            </div>
        </div>
    </section>
</body>
</html>
